<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — educabot</title>
<meta name="description" content="Recursos, estrategias y guías para departamentos de admisiones que quieren captar más matrículas con IA y automatización.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://educabot.com/blog.html">
<meta property="og:type" content="website">
<meta property="og:url" content="https://educabot.com/blog.html">
<meta property="og:title" content="Blog de educabot — Recursos para Admisiones">
<meta property="og:description" content="Estrategias, datos y guías para departamentos de admisiones que quieren captar más matrículas.">
<meta property="og:image" content="https://educabot.com/logo_educabot_crop.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Blog de educabot — Recursos para Admisiones">
<meta name="twitter:description" content="Estrategias y guías para departamentos de admisiones.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #0D1B5E; --blue: #2563EB; --ink: #0d0f14;
  --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0;
  --gray-400: #94a3b8; --gray-500: #64748b; --white: #ffffff;
}
html { scroll-behavior: smooth; }
body { font-family: 'Plus Jakarta Sans', sans-serif; color: var(--ink); background: var(--white); -webkit-font-smoothing: antialiased; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 72px; background: rgba(255,255,255,.95); backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(0,0,0,.06); display: flex; align-items: center;
}
.nav-inner { max-width: 1120px; margin: 0 auto; padding: 0 32px; width: 100%; display: flex; align-items: center; justify-content: space-between; }
.nav-links { display: flex; align-items: center; gap: 32px; }
.nav-links a { font-size: 14px; font-weight: 500; color: var(--gray-500); text-decoration: none; transition: color .15s; }
.nav-links a:hover { color: var(--ink); }
.nav-cta { background: var(--navy); color: white; font-size: 13px; font-weight: 700; padding: 10px 20px; border-radius: 10px; text-decoration: none; transition: background .15s; }
.nav-cta:hover { background: var(--blue); }

.hero { padding: 112px 32px 64px; max-width: 1120px; margin: 0 auto; }
.hero-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--blue); margin-bottom: 16px; display: block; }
.hero h1 { font-size: clamp(36px, 4vw, 56px); font-weight: 800; letter-spacing: -.04em; line-height: 1.05; margin-bottom: 16px; }
.hero p { font-size: 18px; color: var(--gray-500); max-width: 480px; line-height: 1.6; }

.filters { padding: 0 32px 40px; max-width: 1120px; margin: 0 auto; display: flex; gap: 8px; flex-wrap: wrap; }
.filter-btn {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px; font-weight: 600; padding: 8px 18px; border-radius: 100px;
  border: 1.5px solid var(--gray-200); background: white; cursor: pointer;
  color: var(--gray-500); transition: all .15s;
}
.filter-btn:hover, .filter-btn.active { background: var(--navy); color: white; border-color: var(--navy); }

.posts-grid { max-width: 1120px; margin: 0 auto; padding: 0 32px 96px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.post-card {
  border: 1px solid var(--gray-100); border-radius: 16px; overflow: hidden;
  cursor: pointer; text-decoration: none; color: inherit;
  transition: transform .2s, box-shadow .2s; display: block;
}
.post-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,.08); }
.post-thumb { aspect-ratio: 16/9; background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.post-thumb-cat { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--blue); }
.post-content { padding: 20px 22px 24px; }
.post-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.post-tag { font-size: 10px; font-weight: 700; color: var(--blue); letter-spacing: .08em; text-transform: uppercase; }
.post-time { font-size: 10px; color: var(--gray-400); }
.post-title { font-size: 16px; font-weight: 700; line-height: 1.35; margin-bottom: 10px; }
.post-excerpt { font-size: 13px; color: var(--gray-500); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.post-date { font-size: 11px; color: var(--gray-400); margin-top: 14px; font-weight: 500; }

.empty-state { text-align: center; padding: 80px 32px; color: var(--gray-400); grid-column: 1/-1; }
.empty-state h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--gray-500); }

.loading { display: flex; justify-content: center; align-items: center; gap: 6px; padding: 80px; grid-column: 1/-1; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--blue); animation: dotB 1.1s infinite; }
.dot:nth-child(2){animation-delay:.18s}.dot:nth-child(3){animation-delay:.36s}
@keyframes dotB { 0%,60%,100%{transform:scale(.7);opacity:.4} 30%{transform:scale(1);opacity:1} }

footer { border-top: 1px solid var(--gray-100); padding: 32px; }
.footer-inner { max-width: 1120px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
.footer-links { display: flex; gap: 20px; }
.footer-links a { font-size: 13px; color: var(--gray-400); text-decoration: none; transition: color .15s; }
.footer-links a:hover { color: var(--ink); }
.footer-copy { font-size: 12px; color: var(--gray-300); }

@media (max-width: 900px) {
  .posts-grid { grid-template-columns: 1fr 1fr; }
  .nav-links { display: none; }
}
@media (max-width: 600px) {
  .posts-grid { grid-template-columns: 1fr; padding-left: 20px; padding-right: 20px; }
  .hero, .filters { padding-left: 20px; padding-right: 20px; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html"><img src="logo_educabot_crop.png" alt="educabot" style="height:44px;width:auto"></a>
    <div class="nav-links">
      <a href="index.html#producto">Producto</a>
      <a href="index.html#pricing">Precios</a>
      <a href="blog.html" style="color:var(--ink)">Blog</a>
    </div>
    <a href="index.html#demo" class="nav-cta">Agendar demo</a>
  </div>
</nav>

<div class="hero">
  <span class="hero-eyebrow">Blog</span>
  <h1>Recursos para Admisiones</h1>
  <p>Estrategias, datos y guías para departamentos de admisiones que quieren captar más matrículas.</p>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="filterPosts('all', this)">Todos</button>
  <button class="filter-btn" onclick="filterPosts('Captación', this)">Captación</button>
  <button class="filter-btn" onclick="filterPosts('IA', this)">IA</button>
  <button class="filter-btn" onclick="filterPosts('Automatización', this)">Automatización</button>
  <button class="filter-btn" onclick="filterPosts('CRM', this)">CRM</button>
</div>

<div class="posts-grid" id="posts-grid">
  <div class="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
</div>

<footer>
  <div class="footer-inner">
    <img src="logo_educabot_crop.png" alt="educabot" style="height:36px;width:auto">
    <div class="footer-links">
      <a href="politica-de-privacidad.html">Privacidad</a>
      <a href="politica-de-cookies.html">Cookies</a>
      <a href="mailto:hola@imlabs.es">hola@imlabs.es</a>
    </div>
    <span class="footer-copy">© 2025 imlabs</span>
  </div>
</footer>

<script>
const SUPABASE_URL = 'https://jldvhpycybeqqyfyjsjt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_sNRLhyvjFMbxT42b8BWcRA_BvWeEB88';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allPosts = [];

async function loadPosts() {
  const { data, error } = await sb
    .from('posts')
    .select('*')
    .eq('published', true)
    .order('published_at', { ascending: false });

  if (error) {
    document.getElementById('posts-grid').innerHTML = `<div class="empty-state"><h3>Error al cargar posts</h3><p>${error.message}</p></div>`;
    return;
  }
  allPosts = data || [];
  renderPosts(allPosts);
}

function renderPosts(posts) {
  const grid = document.getElementById('posts-grid');
  if (!posts.length) {
    grid.innerHTML = '<div class="empty-state"><h3>Todavía no hay artículos publicados</h3><p>Vuelve pronto.</p></div>';
    return;
  }
  grid.innerHTML = posts.map(p => `
    <a class="post-card" href="post.html?slug=${p.slug}">
      <div class="post-thumb" style="${p.image_url ? `background-image:url(${p.image_url});background-size:cover;background-position:center` : 'background:linear-gradient(135deg,#EFF6FF,#DBEAFE)'}">
        ${!p.image_url ? `<span class="post-thumb-cat">${p.category || 'Blog'}</span>` : ''}
      </div>
      <div class="post-content">
        <div class="post-meta">
          <span class="post-tag">${p.category || 'Blog'}</span>
          <span class="post-time">· ${p.reading_time || '5 min'}</span>
        </div>
        <h3 class="post-title">${p.title}</h3>
        <p class="post-excerpt">${p.excerpt || ''}</p>
        <div class="post-date">${formatDate(p.created_at)}</div>
      </div>
    </a>
  `).join('');
}

function filterPosts(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (cat === 'all') renderPosts(allPosts);
  else renderPosts(allPosts.filter(p => p.category === cat));
}

function formatDate(d) {
  return new Date(d).toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });
}

loadPosts();
</script>
</body>
</html>
