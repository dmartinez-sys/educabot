<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — educabot</title>
<meta name="description" content="">
<meta name="robots" content="index, follow">
<meta property="og:type" content="article">
<meta property="og:image" content="https://educabot.com/logo_educabot_crop.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #0D1B5E; --blue: #2563EB; --ink: #0d0f14;
  --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0;
  --gray-400: #94a3b8; --gray-500: #64748b; --white: #ffffff;
}
body { font-family: 'Plus Jakarta Sans', sans-serif; color: var(--ink); background: var(--white); -webkit-font-smoothing: antialiased; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 72px; background: rgba(255,255,255,.95); backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(0,0,0,.06); display: flex; align-items: center;
}
.nav-inner { max-width: 1120px; margin: 0 auto; padding: 0 32px; width: 100%; display: flex; align-items: center; justify-content: space-between; }
.nav-links { display: flex; align-items: center; gap: 32px; }
.nav-links a { font-size: 14px; font-weight: 500; color: var(--gray-500); text-decoration: none; transition: color .15s; }
.nav-links a:hover { color: var(--ink); }
.nav-cta { background: var(--navy); color: white; font-size: 13px; font-weight: 700; padding: 10px 20px; border-radius: 10px; text-decoration: none; transition: background .15s; }
.nav-cta:hover { background: var(--blue); }

.post-hero { padding: 160px 32px 48px; max-width: 760px; margin: 0 auto; }
.back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: var(--gray-400); text-decoration: none; margin-bottom: 32px; transition: color .15s; }
.back-link:hover { color: var(--ink); }
.post-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.post-tag { font-size: 10px; font-weight: 700; color: var(--blue); letter-spacing: .1em; text-transform: uppercase; background: #eff6ff; padding: 4px 12px; border-radius: 100px; }
.post-time { font-size: 13px; color: var(--gray-400); }
.post-date { font-size: 13px; color: var(--gray-400); }

h1.post-title { font-size: clamp(30px, 4vw, 46px); font-weight: 800; letter-spacing: -.04em; line-height: 1.1; margin-bottom: 20px; }
.post-excerpt { font-size: 18px; color: var(--gray-500); line-height: 1.65; font-weight: 400; border-left: 3px solid var(--blue); padding-left: 20px; margin-bottom: 0; }

.post-body { max-width: 760px; margin: 0 auto; padding: 48px 32px 96px; }
.post-content { font-size: 17px; line-height: 1.8; color: #1e293b; }
.post-content p { margin-bottom: 24px; }
.post-content h2 { font-size: 24px; font-weight: 800; letter-spacing: -.03em; margin: 40px 0 16px; }
.post-content h3 { font-size: 20px; font-weight: 700; margin: 32px 0 12px; }
.post-content ul, .post-content ol { padding-left: 24px; margin-bottom: 24px; }
.post-content li { margin-bottom: 8px; }
.post-content blockquote { border-left: 3px solid var(--blue); padding: 16px 24px; background: #eff6ff; border-radius: 0 8px 8px 0; margin: 32px 0; font-style: italic; color: var(--gray-500); }
.post-content strong { font-weight: 700; color: var(--ink); }
.post-content a { color: var(--blue); }

.divider { border: none; border-top: 1px solid var(--gray-100); margin: 48px 0; }

.cta-box { background: var(--navy); border-radius: 20px; padding: 40px; text-align: center; margin-top: 48px; }
.cta-box h3 { font-size: 24px; font-weight: 800; color: white; margin-bottom: 12px; letter-spacing: -.03em; }
.cta-box p { font-size: 15px; color: #93c5fd; margin-bottom: 24px; }
.cta-box a { display: inline-block; background: var(--blue); color: white; font-weight: 700; font-size: 15px; padding: 13px 28px; border-radius: 12px; text-decoration: none; transition: background .15s; }
.cta-box a:hover { background: #1d4ed8; }

.loading { display: flex; justify-content: center; padding: 120px 32px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--blue); animation: dotB 1.1s infinite; display: inline-block; margin: 0 3px; }
.dot:nth-child(2){animation-delay:.18s}.dot:nth-child(3){animation-delay:.36s}
@keyframes dotB { 0%,60%,100%{transform:scale(.7);opacity:.4} 30%{transform:scale(1);opacity:1} }

.not-found { text-align: center; padding: 120px 32px; }
.not-found h2 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
.not-found p { color: var(--gray-500); margin-bottom: 24px; }
.not-found a { color: var(--blue); font-weight: 600; text-decoration: none; }

footer { border-top: 1px solid var(--gray-100); padding: 32px; }
.footer-inner { max-width: 1120px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
.footer-links { display: flex; gap: 20px; }
.footer-links a { font-size: 13px; color: var(--gray-400); text-decoration: none; }
.footer-links a:hover { color: var(--ink); }
.footer-copy { font-size: 12px; color: var(--gray-300); }

@media (max-width: 600px) {
  .post-hero, .post-body { padding-left: 20px; padding-right: 20px; }
  .nav-links { display: none; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="landing.html"><img src="logo_educabot_crop.png" alt="educabot" style="height:44px;width:auto"></a>
    <div class="nav-links">
      <a href="landing.html#producto">Producto</a>
      <a href="landing.html#pricing">Precios</a>
      <a href="blog.html" style="color:var(--ink)">Blog</a>
    </div>
    <a href="landing.html#demo" class="nav-cta">Agendar demo</a>
  </div>
</nav>

<div id="loading" class="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
<div id="content" style="display:none"></div>
<div id="not-found" class="not-found" style="display:none">
  <h2>Artículo no encontrado</h2>
  <p>El artículo que buscas no existe o ha sido eliminado.</p>
  <a href="blog.html">← Volver al blog</a>
</div>

<footer>
  <div class="footer-inner">
    <img src="logo_educabot_crop.png" alt="educabot" style="height:36px;width:auto">
    <div class="footer-links">
      <a href="politica-de-privacidad.html">Privacidad</a>
      <a href="politica-de-cookies.html">Cookies</a>
      <a href="mailto:hola@imlabs.es">hola@imlabs.es</a>
    </div>
    <span class="footer-copy">© 2025 imlabs</span>
  </div>
</footer>

<script>
const SUPABASE_URL = 'https://jldvhpycybeqqyfyjsjt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_sNRLhyvjFMbxT42b8BWcRA_BvWeEB88';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function formatDate(d) {
  return new Date(d).toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });
}

// Render markdown-like content
function renderContent(text) {
  if (!text) return '';
  return text
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[h|u|b|l])(.+)$/gm, (m) => m.startsWith('<') ? m : m)
    .split('\n').map(line => {
      if (line.startsWith('<h') || line.startsWith('<ul') || line.startsWith('<li') || line.startsWith('<blockquote')) return line;
      return line ? `<p>${line}</p>` : '';
    }).join('');
}

async function loadPost() {
  const slug = new URLSearchParams(location.search).get('slug');
  if (!slug) { show('not-found'); return; }

  const { data } = await sb.from('posts').select('*').eq('slug', slug).eq('published', true).single();

  document.getElementById('loading').style.display = 'none';

  if (!data) { show('not-found'); return; }

  document.title = `${data.title} — educabot`;
  document.querySelector('meta[name="description"]').setAttribute('content', data.excerpt || data.title);
  document.querySelector('meta[property="og:title"]')?.setAttribute('content', `${data.title} — educabot`);
  document.querySelector('meta[property="og:description"]')?.setAttribute('content', data.excerpt || '');

  document.getElementById('content').innerHTML = `
    <div class="post-hero">
      <a href="blog.html" class="back-link">← Volver al blog</a>
      <div class="post-meta">
        <span class="post-tag">${data.category || 'Blog'}</span>
        <span class="post-time">${data.reading_time || ''}</span>
        <span class="post-date">${formatDate(data.created_at)}</span>
      </div>
      <h1 class="post-title">${data.title}</h1>
      ${data.excerpt ? `<p class="post-excerpt">${data.excerpt}</p>` : ''}
    </div>
    <div class="post-body">
      <div class="post-content">${renderContent(data.content)}</div>
      <hr class="divider">
      <div class="cta-box">
        <h3>¿Quieres ver educabot en acción?</h3>
        <p>Agenda una demo gratuita y te mostramos cómo automatizar la captación de tu centro.</p>
        <a href="landing.html#demo">Agendar demo gratuita</a>
      </div>
    </div>
  `;
  document.getElementById('content').style.display = 'block';
}

function show(id) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById(id).style.display = 'block';
}

loadPost();
</script>
</body>
</html>
